<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Facts – Secondary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.app {
  background: white;
  max-width: 500px;
  width: 100%;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 { text-align: center; margin-top: 0; }

.menu-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.button-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

button {
  padding: 10px;
  font-size: 1rem;
  border-radius: 10px;
  border: 2px solid #ccc;
  background: #f4f6f8;
  cursor: pointer;
}

button.active {
  background: #007bff;
  color: white;
  border-color: #007bff;
}

.session.active {
  background: #28a745;
  color: white;
  border-color: #28a745;
}

.stats {
  text-align: center;
  margin: 10px 0;
  font-size: 1.1rem;
}

.instruction {
  font-size: 0.95rem;
  color: #666;
  margin-bottom: 6px;
}

.question {
  font-size: 2.4rem;
  font-family: monospace;
  margin: 15px auto;
  width: 240px;
  text-align: right;
  white-space: pre-line;
}

.single-line {
  white-space: nowrap;
  text-align: center;
  width: auto;
}

input {
  padding: 6px;
  font-size: 1rem;
}

.answer-input {
  font-size: 1.5rem;
  width: 140px;
  text-align: center;
  display: block;
  margin: auto;
}

.correct { border: 3px solid #28a745; background: #eafaf1; }
.incorrect { border: 3px solid #dc3545; background: #fdecea; }

.feedback {
  min-height: 32px;
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>
<div class="app">

<h1>Fast Facts</h1>

<!-- SESSION MODE -->
<div class="session-buttons">
  <button id="btn-practice" class="session active" onclick="setSessionMode('practice')">Practice</button>
  <button id="btn-fluency" class="session" onclick="setSessionMode('fluency')">Fluency (60s)</button>
</div>

<!-- CATEGORY MENU -->
<div id="categoryMenu">
  <div class="menu-title">Choose a category</div>
  <div class="button-grid">
    <button onclick="openCategory('number')">Number</button>
    <button onclick="openCategory('integers')">Integers</button>
    <button onclick="openCategory('exponents')">Exponents</button>
  </div>
</div>

<!-- SKILL MENU -->
<div id="skillMenu" style="display:none;">
  <div class="menu-title">Choose a skill</div>
  <div class="button-grid" id="skillButtons"></div>
  <button onclick="backToCategories()">⬅ Back</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

  <!-- ✅ STUDENT IDENTIFICATION -->
  <div style="margin-bottom:12px;">
    <label>
      Name:<br>
      <input type="text" id="studentName" placeholder="Your name">
    </label><br>

    <label>
      Class:<br>
      <input type="text" id="classCode" placeholder="e.g. 9A">
    </label>
  </div>

  <div class="stats">
    ⏱ <span id="time">∞</span> | ✅ <span id="score">0</span>
  </div>

  <div class="instruction" id="instruction">
    Press Start when ready
  </div>

  <div class="question" id="question"></div>

  <input type="number" id="answer" class="answer-input" disabled>

  <!-- TIMES TABLES DIFFICULTY -->
  <div id="timesTableDifficulty" style="display:none; margin-bottom:10px;">
    <div class="menu-title">Times Tables Level</div>
    <div class="button-grid">
      <button onclick="setTimesTableLevel(1)">Level 1</button>
      <button class="active" onclick="setTimesTableLevel(2)">Level 2</button>
      <button onclick="setTimesTableLevel(3)">Level 3</button>
    </div>
  </div>

  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Reset</button>

  <div class="feedback" id="feedback"></div>
</div>
  <div class="stats">
    ⏱ <span id="time">∞</span> | ✅ <span id="score">0</span>
  </div>

  <div class="instruction" id="instruction">
    Press Start when ready
  </div>

  <div class="question" id="question"></div>

  <input type="number" id="answer" class="answer-input" disabled>

  <!-- TIMES TABLES DIFFICULTY -->
  <div id="timesTableDifficulty" style="display:none; margin-bottom:10px;">
    <div class="menu-title">Times Tables Level</div>
    <div class="button-grid">
      <button onclick="setTimesTableLevel(1)">Level 1</button>
      <button class="active" onclick="setTimesTableLevel(2)">Level 2</button>
      <button onclick="setTimesTableLevel(3)">Level 3</button>
    </div>
  </div>

  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Reset</button>

  <div class="feedback" id="feedback"></div>
</div>

</div>

<script>
/* ---------- STATE ---------- */
let sessionMode = "practice";
let currentSkill = null;
let timesTableLevel = 2;
let score = 0, attempts = 0, timer, timeLeft = 60;
let correctAnswer;

/* ---------- SKILLS ---------- */
const skills = {
  number: [
    ["timesTables","Times Tables"],
    ["division","Division"],
    ["addition","Addition"],
    ["subtraction","Subtraction"],
    ["orderOps","Order of Operations"]
  ],
  integers: [
    ["intAddSub","Integer Add/Subtract"],
    ["intMultDiv","Integer Multiply/Divide"]
  ],
  exponents: [
    ["squares","Square Numbers"],
    ["roots","Square Roots"]
  ]
};

/* ---------- ELEMENTS ---------- */
const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const feedbackEl = document.getElementById("feedback");
const studentNameEl = document.getElementById("studentName");
const classCodeEl = document.getElementById("classCode");

/* Enter key submit */
answerEl.addEventListener("keydown", e => {
  if (e.key === "Enter") checkAnswer();
});

/* ---------- MENU ---------- */
function setSessionMode(mode){
  sessionMode = mode;
  document.querySelectorAll(".session").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+mode).classList.add("active");
}

function openCategory(cat){
  categoryMenu.style.display = "none";
  skillMenu.style.display = "block";
  skillButtons.innerHTML = "";
  skills[cat].forEach(s=>{
    const b=document.createElement("button");
    b.textContent=s[1];
    b.onclick=()=>chooseSkill(s[0]);
    skillButtons.appendChild(b);
  });
}

function backToCategories(){
  skillMenu.style.display="none";
  categoryMenu.style.display="block";
}

function chooseSkill(skill){
  currentSkill = skill;
  skillMenu.style.display="none";
  game.style.display="block";
  timesTableDifficulty.style.display =
    skill==="timesTables"?"block":"none";
}

/* ---------- GAME ---------- */
function startGame(){
  if(sessionMode==="fluency" && (!studentNameEl.value || !classCodeEl.value)){
    alert("Enter name and class for Fluency mode");
    return;
  }
  score = attempts = 0;
  scoreEl.textContent = "0";
  feedbackEl.textContent="";
  answerEl.disabled=false;
  answerEl.value="";
  answerEl.focus();

  clearInterval(timer);
  if(sessionMode==="fluency"){
    timeLeft=60;
    timeEl.textContent=60;
    timer=setInterval(()=>{
      timeLeft--;
      timeEl.textContent=timeLeft;
      if(timeLeft<=0)endGame();
    },1000);
  } else timeEl.textContent="∞";

  nextQuestion();
}

/* ---------- QUESTION LOGIC ---------- */
function nextQuestion(){
  questionEl.classList.remove("single-line");

  if(currentSkill==="timesTables"){
    let tables = timesTableLevel===1?[1,2,4,5,10]:
                 timesTableLevel===2?[...Array(12).keys()].map(i=>i+1):
                 [...Array(20).keys()].map(i=>i+1);
    const a=tables[randIndex(tables.length)];
    const b=tables[randIndex(tables.length)];
    correctAnswer=a*b;
    out(`${a} × ${b}`);
  }

  if(currentSkill==="division"){
    const b=rand(12), a=b*rand(12);
    correctAnswer=a/b;
    out(`${a} ÷ ${b}`);
  }

  if(currentSkill==="addition"){
    const a=randRange(10,999), b=randRange(10,999);
    correctAnswer=a+b;
    questionEl.textContent=`${a}\n+ ${b}`;
  }

  if(currentSkill==="subtraction"){
    let a=randRange(10,999), b=randRange(10,999);
    if(b>a)[a,b]=[b,a];
    correctAnswer=a-b;
    questionEl.textContent=`${a}\n− ${b}`;
  }

  if(currentSkill==="orderOps"){
    const a=rand(10), b=rand(10), c=rand(10);
    correctAnswer=a+b*c;
    out(`${a} + ${b} × ${c}`);
  }

  if(currentSkill==="intAddSub"){
    const a=randRange(-20,20), b=randRange(-20,20);
    correctAnswer=a+b;
    out(`${a} + ${b}`);
  }

  if(currentSkill==="intMultDiv"){
    const a=randRange(-10,10)||1, b=randRange(-10,10)||1;
    correctAnswer=a*b;
    out(`${a} × ${b}`);
  }

  if(currentSkill==="squares"){
    const a=rand(15);
    correctAnswer=a*a;
    out(`${a}²`);
  }

  if(currentSkill==="roots"){
    const a=rand(15);
    correctAnswer=a;
    out(`√${a*a}`);
  }
}

/* ---------- ANSWER ---------- */
function checkAnswer(){
  attempts++;
  if(Number(answerEl.value)===correctAnswer){
    score++;
    answerEl.className="answer-input correct";
  } else {
    answerEl.className="answer-input incorrect";
    feedbackEl.textContent=`⛔ ${correctAnswer}`;
  }
  scoreEl.textContent=score;
  setTimeout(()=>{
    answerEl.className="answer-input";
    answerEl.value="";
    answerEl.focus();
    nextQuestion();
  },400);
}

function endGame(){
  clearInterval(timer);
  answerEl.disabled=true;
  const acc=attempts?score/attempts:0;
  feedbackEl.innerHTML=`Accuracy: ${(acc*100).toFixed(0)}%<br>
  Fluency Score: <strong>${Math.round(score*acc*acc)}</strong>`;
}

function resetGame(){
  if(score>0&&!confirm("Reset and choose again?"))return;
  clearInterval(timer);
  game.style.display="none";
  categoryMenu.style.display="block";
  feedbackEl.textContent="";
}

/* ---------- HELPERS ---------- */
function out(t){questionEl.textContent=t;questionEl.classList.add("single-line");}
function rand(m){return Math.floor(Math.random()*m)+1;}
function randRange(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function randIndex(l){return Math.floor(Math.random()*l);}
</script>
</body>
</html>
