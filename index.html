<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fast Facts – Secondary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.app {
  background: white;
  max-width: 480px;
  width: 100%;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 { text-align: center; margin-top: 0; }

.menu-title {
  font-weight: bold;
  margin-bottom: 8px;
}

.button-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

button {
  padding: 10px;
  font-size: 1rem;
  border-radius: 10px;
  border: 2px solid #ccc;
  background: #f4f6f8;
  cursor: pointer;
}

button.active {
  background: #007bff;
  color: white;
  border-color: #007bff;
}

.session.active {
  background: #28a745;
  color: white;
  border-color: #28a745;
}

.stats {
  text-align: center;
  margin-bottom: 10px;
  font-size: 1.1rem;
}

.instruction {
  font-size: 0.95rem;
  color: #666;
  margin-bottom: 6px;
}

.question {
  font-size: 2.6rem;
  font-family: monospace;
  margin: 15px auto;
  width: 240px;
  text-align: right;
  white-space: pre-line;
}

.single-line {
  white-space: nowrap;
  text-align: center;
  width: auto;
}

input {
  font-size: 1rem;
  width: 180px;
  padding: 6px;
  margin: 4px 0;
}

.answer-input {
  font-size: 1.5rem;
  width: 140px;
  text-align: center;
  display: block;
  margin: auto;
}

.correct { border: 3px solid #28a745; background: #eafaf1; }
.incorrect { border: 3px solid #dc3545; background: #fdecea; }

.feedback {
  min-height: 32px;
  margin-top: 10px;
  text-align: center;
}
</style>
</head>

<body>
<div class="app">

<h1>Fast Facts</h1>

<!-- SESSION MODE -->
<div class="session-buttons">
  <button id="btn-practice" class="session active" onclick="setSessionMode('practice')">Practice</button>
  <button id="btn-fluency" class="session" onclick="setSessionMode('fluency')">Fluency (60s)</button>
</div>

<!-- CATEGORY MENU -->
<div id="categoryMenu">
  <div class="menu-title">Choose a category</div>
  <div class="button-grid">
    <button onclick="openCategory('number')">Number</button>
    <button onclick="openCategory('integers')">Integers</button>
    <button onclick="openCategory('exponents')">Exponents</button>
  </div>
</div>

<!-- SKILL MENU -->
<div id="skillMenu" style="display:none;">
  <div class="menu-title" id="skillTitle"></div>
  <div class="button-grid" id="skillButtons"></div>
  <button onclick="backToCategories()">⬅ Back</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

  <!-- ✅ STUDENT IDENTIFICATION -->
  <div style="margin-bottom:12px;">
    <label>
      Name:<br>
      <input type="text" id="studentName" placeholder="Your name">
    </label><br>
    <label>
      Class:<br>
      <input type="text" id="classCode" placeholder="e.g. 9A">
    </label>
  </div>

  <div class="stats">
    ⏱ <span id="time">∞</span> | ✅ <span id="score">0</span>
  </div>

  <div class="instruction" id="instruction">
    Choose a skill, then press Start
  </div>

  <div class="question" id="question"></div>

  <input type="number" id="answer" class="answer-input" disabled>

  <!-- TIMES TABLES DIFFICULTY -->
  <div id="timesTableDifficulty" style="display:none; margin-bottom:10px;">
    <div class="menu-title">Times Tables Level</div>
    <div class="button-grid">
      <button id="tt1" onclick="setTimesTableLevel(1)">Level 1</button>
      <button id="tt2" class="active" onclick="setTimesTableLevel(2)">Level 2</button>
      <button id="tt3" onclick="setTimesTableLevel(3)">Level 3</button>
    </div>
  </div>

  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Reset</button>

  <div class="feedback" id="feedback"></div>
</div>

</div>

<script>
/* ========= GLOBAL STATE ========= */
let sessionMode="practice", currentSkill=null, timesTableLevel=2;
let num1,num2,correctAnswer,score=0,attempts=0,timer,timeLeft=60;

/* ========= ELEMENTS ========= */
const questionEl=document.getElementById("question");
const answerEl=document.getElementById("answer");
const scoreEl=document.getElementById("score");
const timeEl=document.getElementById("time");
const feedbackEl=document.getElementById("feedback");
const instructionEl=document.getElementById("instruction");
const studentNameEl=document.getElementById("studentName");
const classCodeEl=document.getElementById("classCode");

/* ENTER KEY */
answerEl.addEventListener("keydown",e=>{if(e.key==="Enter")checkAnswer();});

/* ========= MENU ========= */
function setSessionMode(mode){
  sessionMode=mode;
  document.querySelectorAll(".session").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+mode).classList.add("active");
}

function openCategory(cat){
  document.getElementById("categoryMenu").style.display="none";
  document.getElementById("skillMenu").style.display="block";
  const holder=document.getElementById("skillButtons");
  holder.innerHTML="";
  skills[cat].forEach(s=>{
    const b=document.createElement("button");
    b.textContent=s[1];
    b.onclick=()=>chooseSkill(s[0]);
    holder.appendChild(b);
  });
}

function backToCategories(){
  document.getElementById("skillMenu").style.display="none";
  document.getElementById("categoryMenu").style.display="block";
}

function chooseSkill(skill){
  currentSkill=skill;
  document.getElementById("skillMenu").style.display="none";
  document.getElementById("game").style.display="block";
  instructionEl.textContent="Press Start when ready";
  document.getElementById("timesTableDifficulty").style.display=
    skill==="timesTables"?"block":"none";
}

/* ========= START GAME ========= */
function startGame(){
  if(sessionMode==="fluency"){
    if(!studentNameEl.value||!classCodeEl.value){
      alert("Please enter your name and class before starting Fluency mode.");
      return;
    }
  }
  score=attempts=0;
  scoreEl.textContent="0";
  feedbackEl.textContent="";
  answerEl.value="";
  answerEl.disabled=false;
  answerEl.focus();

  clearInterval(timer);
  if(sessionMode==="fluency"){
    timeLeft=60;
    timeEl.textContent=60;
    timer=setInterval(()=>{
      timeLeft--;
      timeEl.textContent=timeLeft;
      if(timeLeft<=0)endGame();
    },1000);
  } else timeEl.textContent="∞";
  nextQuestion();
}

/* ========= QUESTIONS ========= */
function nextQuestion(){
  questionEl.classList.remove("single-line");

  if(currentSkill==="timesTables"){
    let t=timesTableLevel===1?[1,2,4,5,10]:
          timesTableLevel===2?[...Array(12).keys()].map(i=>i+1):
          [...Array(20).keys()].map(i=>i+1);
    num1=t[Math.floor(Math.random()*t.length)];
    num2=t[Math.floor(Math.random()*t.length)];
    correctAnswer=num1*num2;
    out(`${num1} × ${num2}`);
  }
}

function out(text){
  questionEl.textContent=text;
  questionEl.classList.add("single-line");
}

function checkAnswer(){
  attempts++;
  if(Number(answerEl.value)===correctAnswer){
    score++;
    answerEl.classList.add("correct");
  } else {
    answerEl.classList.add("incorrect");
    feedbackEl.textContent=`⛔ ${correctAnswer}`;
  }
  scoreEl.textContent=score;
  setTimeout(()=>{answerEl.value="";answerEl.focus();nextQuestion();},400);
}

function endGame(){
  clearInterval(timer);
  answerEl.disabled=true;
  const acc=attempts?score/attempts:0;
  feedbackEl.innerHTML=`Accuracy: ${(acc*100).toFixed(0)}%<br>
  Fluency Score: <strong>${Math.round(score*acc*acc)}</strong>`;
}

function resetGame(){
  if(score>0&&!confirm("Reset and choose again?"))return;
  clearInterval(timer);
  document.getElementById("game").style.display="none";
  document.getElementById("categoryMenu").style.display="block";
  feedbackEl.textContent="";
}

/* ========= DATA ========= */
const skills={
  number:[["timesTables","Times Tables"]],
  integers:[],
  exponents:[]
};
</script>
</body>
</html>
